<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Command Center — Brady's Build (Prototype)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react"
  }
}
</script>
<style>html,body,#root{height:100%;margin:0;}</style>
</head>
<body>
<div style="background:#1E2B23;color:#F5F2EA;padding:10px 16px;text-align:center;font:14px/1.5 Inter,system-ui,sans-serif;">
  <strong style="color:#C99A3C">Prototype — Brady's build.</strong> Interactive mock with sample data; nothing saves. The working tracker is at
  <a href="index.html" style="color:#fff;text-decoration:underline;">the Command Center</a>.
</div>

<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#888;">Loading the Command Center…</div>
<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useMemo } from "react";
import {
  LayoutDashboard, Crosshair, Kanban, Inbox, Users, Gift, FileText, Wand2,
  Flame, Snowflake, Sun, ArrowRight, Check, X, Copy, Phone, Mail,
  Globe, Clock, AlertTriangle, TrendingUp, DollarSign, Plus, CreditCard, Send, Repeat
} from "lucide-react";

/* ------------------------------------------------------------------ */
/*  PIEDMONDO COMMAND CENTER — interactive demo                        */
/*  In the live build these datasets are Supabase tables:              */
/*  prospects, deals, inbound, clients, invoices, referrals            */
/*  Stripe actions run in Edge Functions; the webhook flips statuses.  */
/* ------------------------------------------------------------------ */

const today = new Date();
const d = (offset) => {
  const x = new Date(today);
  x.setDate(x.getDate() + offset);
  return x.toISOString().slice(0, 10);
};
const fmtDate = (iso) =>
  iso ? new Date(iso + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—";

const STAGES = ["Demo built", "Sent", "Responded", "Call booked", "Proposal"];
const CLOSED = ["Won", "Lost", "Ghosted"];

const seedProspects = [
  { id: 1, name: "Fade Factory Barbershop", niche: "Barbershop", city: "Atlanta, GA", web: "Facebook-only", contact: "Big Mike", phone: "(404) 555-0131", source: "Maps scrape", priority: "Hot", stage: "Demo queued" },
  { id: 2, name: "Peach State Pressure Wash", niche: "Pressure washing", city: "Marietta, GA", web: "No website", contact: "", phone: "(678) 555-0119", source: "Maps scrape", priority: "Warm", stage: "Untouched" },
  { id: 3, name: "Bella Nails & Spa", niche: "Nail studio", city: "Buffalo, NY", web: "Outdated site", contact: "Linh", phone: "(716) 555-0163", source: "Maps scrape", priority: "Warm", stage: "Untouched" },
  { id: 4, name: "Ironclad Concrete LLC", niche: "Epoxy & concrete", city: "Amherst, NY", web: "No website", contact: "", phone: "", source: "LLC filing", priority: "Hot", stage: "Demo queued" },
  { id: 5, name: "Southside Detailing", niche: "Auto detailing", city: "Decatur, GA", web: "Facebook-only", contact: "Trey", phone: "(404) 555-0188", source: "Facebook group", priority: "Warm", stage: "Untouched" },
];

const seedDeals = [
  { id: 101, name: "Fade Factory Barbershop", contact: "Big Mike", niche: "Barbershop", source: "Maps scrape", demo: "piedmondo.com/demos/fadefactory", sent: d(0), followUp: d(3), stage: "Sent", quote: 350, monthly: 10, channel: "Text" },
  { id: 102, name: "Ironclad Concrete LLC", contact: "—", niche: "Epoxy & concrete", source: "LLC filing", demo: "piedmondo.com/demos/ironclad", sent: d(-6), followUp: d(1), stage: "Call booked", quote: 550, monthly: 10, channel: "Email" },
  { id: 103, name: "Carter Lawn Care", contact: "Devon Carter", niche: "Lawn care", source: "Inbound", demo: "piedmondo.com/demos/carter", sent: d(-10), followUp: d(-1), stage: "Proposal", quote: 450, monthly: 10, channel: "Email" },
  { id: 104, name: "Southside Detailing", contact: "Trey", niche: "Auto detailing", source: "Facebook group", demo: "piedmondo.com/demos/southside", sent: d(-17), followUp: null, stage: "Ghosted", quote: 350, monthly: 0, channel: "FB DM" },
  { id: 105, name: "Hearth & Crumb Bakery", contact: "Ana", niche: "Bakery", source: "Nextdoor", demo: "piedmondo.com/demos/hearth", sent: null, followUp: d(0), stage: "Demo built", quote: 300, monthly: 10, channel: "—" },
];

const seedInbound = [
  { id: 201, name: "Maria Lopez", email: "maria@example.com", phone: "(770) 555-0142", biz: "Taqueria La Mesa — no site", need: "Single page with menu + hours", when: d(-1), status: "New" },
  { id: 202, name: "Devon Carter", email: "dcarter@example.com", phone: "(716) 555-0177", biz: "carterlawncare.com", need: "Redesign — site is from 2014", when: d(-5), status: "In pipeline" },
];

const seedClients = [
  { id: 301, name: "Xtreme Epoxy Coatings", niche: "Epoxy & concrete", city: "Williamsville, NY", build: 600, monthly: 10, status: "Active", plan: true, billingEmail: "brilliance716@xtremeepoxycoatings.com" },
  { id: 302, name: "Giland Auto Detailing", niche: "Auto detailing", city: "Naperville, IL", build: 350, monthly: 10, status: "Active", plan: false, billingEmail: "giland@example.com" },
  { id: 303, name: "Bella Nails & Spa", niche: "Nail studio", city: "Buffalo, NY", build: 400, monthly: 10, status: "Active", plan: false, billingEmail: "bella@example.com" },
];

const seedInvoices = [
  { id: 501, clientId: 301, desc: "Website build — xtreme-epoxycoatings.com", amount: 600, status: "paid", when: d(-21) },
  { id: 502, clientId: 301, desc: "Maintenance plan — monthly", amount: 10, status: "pending", when: d(-2) },
  { id: 503, clientId: 302, desc: "Website build — Giland Detailing", amount: 350, status: "paid", when: d(-9) },
];

const seedReferrals = [
  { id: 401, referrer: "Xtreme Epoxy (owner)", business: "Ironclad Concrete LLC", status: "Contacted", payout: 50, paid: false },
];

const templates = [
  { id: "xtreme", name: "Xtreme Epoxy — service/quote build", notes: "Dark + brand color, 5-step instant quote configurator, booking flow. Best for trades." },
  { id: "giland", name: "Giland Detailing — visual showcase", notes: "Gallery-forward, package pricing cards. Best for detailing, barbers, salons." },
  { id: "bella", name: "Bella Nails — warm local service", notes: "Soft palette, services + hours + booking CTA. Best for studios, restaurants, cafés." },
];

const scripts = [
  { title: "Cold email — demo first", tag: "The core play", body: "Subject: I built [Business Name] a website (it's free to look)\n\nHi [First Name],\n\nI came across [Business Name] while looking at [niche]s in [City] — you do great work, but I noticed you don't have a website.\n\nSo I built you one. No strings, took me an afternoon:\n\n[demo link]\n\nIf you like it, it's yours — flat rate from $250, live in about a week, and we handle everything. If not, the preview stays free.\n\n— [Your name], Piedmondo" },
  { title: "Text / DM version", tag: "Fast channel", body: "Hey [First Name] — I run Piedmondo, we build websites for small businesses. I noticed [Business Name] runs on Facebook only, so I built you a homepage preview (free, no catch): [demo link]. If you like it, it's yours from $250 flat. Worth a look?" },
  { title: "Follow-up #1", tag: "+3 days", body: "Hi [First Name] — floating this back up. The free homepage preview I built for [Business Name] is still live: [demo link]. Happy to tweak colors or photos before you decide anything. Want me to?" },
  { title: "Follow-up #2", tag: "+7 days, last one", body: "Last note from me, [First Name] — I'll take the [Business Name] preview down at the end of the month to make room for other builds. If you want it, it's from $250 flat and live within a week: [demo link]. Either way, all the best." },
  { title: "Inbound reply", tag: "Answer within the hour", body: "Hi [Name], thanks for reaching out through piedmondo.com! Based on what you described, this looks like our [$250 base / $350–600 standard] tier. Next step: we build you a free homepage demo so you can see it before spending a dollar. Do you have a logo and photos, and is [phone] good for a 10-minute call?" },
  { title: "Referral ask", tag: "Send at every launch", body: "One favor: you know other business owners. Anyone you send our way who launches a site, we send you $50 — and they get the same free-demo-first treatment you did. Just text me a name and number, we handle the rest." },
];

/* ------------------------------------------------------------------ */

const C = {
  ink: "#1E2B23", pine: "#2F6B4F", pineSoft: "#E7EFE9",
  gold: "#C99A3C", goldSoft: "#F6EBD4", paper: "#F5F2EA",
  line: "#E3DECF", red: "#B3402A", redSoft: "#F7E4DE", mute: "#6E7A72",
};

const Money = ({ v, size = "text-sm", color = C.ink }) => (
  <span className={size} style={{ fontFamily: "'JetBrains Mono', monospace", color }}>
    ${Number(v || 0).toLocaleString()}
  </span>
);

const Pill = ({ children, bg, fg, dot }) => (
  <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium"
    style={{ background: bg, color: fg }}>
    {dot && <span className="w-1.5 h-1.5 rounded-full" style={{ background: fg }} />}
    {children}
  </span>
);

const invoicePill = (s) =>
  s === "paid" ? <Pill bg={C.pineSoft} fg={C.pine} dot>Paid</Pill>
  : s === "overdue" ? <Pill bg={C.redSoft} fg={C.red} dot>Overdue</Pill>
  : <Pill bg={C.goldSoft} fg="#8A6217" dot>Pending</Pill>;

const priorityPill = (p) =>
  p === "Hot" ? <Pill bg={C.redSoft} fg={C.red}><Flame size={11} /> Hot</Pill>
  : p === "Warm" ? <Pill bg={C.goldSoft} fg="#8A6217"><Sun size={11} /> Warm</Pill>
  : <Pill bg="#E8ECF2" fg="#5A6B85"><Snowflake size={11} /> Cold</Pill>;

/* ------------------------------------------------------------------ */

export default function PiedmondoCommandCenter() {
  const [view, setView] = useState("dashboard");
  const [prospects, setProspects] = useState(seedProspects);
  const [deals, setDeals] = useState(seedDeals);
  const [inbound, setInbound] = useState(seedInbound);
  const [clients, setClients] = useState(seedClients);
  const [invoices, setInvoices] = useState(seedInvoices);
  const [referrals] = useState(seedReferrals);
  const [toast, setToast] = useState(null);
  const [copied, setCopied] = useState(null);

  /* Demo Builder form state */
  const [db_dealId, setDbDeal] = useState("");
  const [db_template, setDbTemplate] = useState(templates[0].id);
  const [db_primary, setDbPrimary] = useState("#1E2B23");
  const [db_accent, setDbAccent] = useState("#C99A3C");
  const [db_vibe, setDbVibe] = useState("Bold");
  const [db_services, setDbServices] = useState("");
  const [db_extras, setDbExtras] = useState("");
  const [db_prompt, setDbPrompt] = useState("");

  const ping = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  /* ---------- live KPIs (Supabase views in the real build) ---------- */
  const k = useMemo(() => {
    const open = deals.filter((x) => !CLOSED.includes(x.stage));
    const overdueFu = open.filter((x) => x.followUp && x.followUp <= d(0));
    const sent = deals.filter((x) => x.sent);
    const responded = deals.filter((x) => ["Responded", "Call booked", "Proposal", "Won"].includes(x.stage));
    return {
      untouched: prospects.filter((p) => p.stage === "Untouched").length,
      queued: prospects.filter((p) => p.stage === "Demo queued").length,
      inboundNew: inbound.filter((i) => i.status === "New").length,
      overdueFu,
      pipelineValue: open.reduce((s, x) => s + (x.quote || 0), 0),
      mrr: clients.filter((x) => x.status === "Active").reduce((s, x) => s + (x.monthly || 0), 0),
      responseRate: sent.length ? Math.round((responded.length / sent.length) * 100) : 0,
      openCount: open.length,
      collected: invoices.filter((i) => i.status === "paid").reduce((s, i) => s + i.amount, 0),
      outstanding: invoices.filter((i) => i.status !== "paid").reduce((s, i) => s + i.amount, 0),
      pendingCount: invoices.filter((i) => i.status !== "paid").length,
    };
  }, [prospects, deals, inbound, clients, invoices]);

  /* ---------- pipeline mutations ---------- */
  const advanceDeal = (id) => setDeals((ds) => ds.map((x) => {
    if (x.id !== id) return x;
    const i = STAGES.indexOf(x.stage);
    const next = i >= 0 && i < STAGES.length - 1 ? STAGES[i + 1] : x.stage;
    return { ...x, stage: next, sent: next === "Sent" && !x.sent ? d(0) : x.sent, followUp: d(3) };
  }));

  const closeDeal = (id, outcome) => {
    const deal = deals.find((x) => x.id === id);
    setDeals((ds) => ds.map((x) => (x.id === id ? { ...x, stage: outcome, followUp: null } : x)));
    if (outcome === "Won" && deal) {
      setClients((cs) => [...cs, { id: Date.now(), name: deal.name, niche: deal.niche, city: "—", build: deal.quote, monthly: deal.monthly, status: "Active", plan: false, billingEmail: "" }]);
      ping(`${deal.name} won — added to Clients. Send the build invoice from their card.`);
    } else ping(`${deal.name} marked ${outcome.toLowerCase()}`);
  };

  const promoteProspect = (id) => {
    const p = prospects.find((x) => x.id === id);
    if (!p) return;
    setProspects((ps) => ps.map((x) => (x.id === id ? { ...x, stage: "Moved to Pipeline" } : x)));
    const newId = Date.now();
    setDeals((ds) => [...ds, { id: newId, name: p.name, contact: p.contact || "—", niche: p.niche, source: p.source, demo: "—", sent: null, followUp: d(2), stage: "Demo built", quote: 350, monthly: 10, channel: "—" }]);
    setDbDeal(String(newId));
    ping(`${p.name} moved to Pipeline — build their demo in the Demo Builder`);
    setView("builder");
  };

  const queueDemo = (id) => setProspects((ps) => ps.map((x) => (x.id === id ? { ...x, stage: "Demo queued" } : x)));

  const inboundToPipeline = (id) => {
    const i = inbound.find((x) => x.id === id);
    if (!i || i.status === "In pipeline") return;
    setInbound((is) => is.map((x) => (x.id === id ? { ...x, status: "In pipeline" } : x)));
    setDeals((ds) => [...ds, { id: Date.now(), name: i.biz.split("—")[0].trim(), contact: i.name, niche: "—", source: "Inbound", demo: "—", sent: null, followUp: d(1), stage: "Demo built", quote: 350, monthly: 10, channel: "Email" }]);
    ping(`${i.name} moved to Pipeline`);
  };

  /* ---------- billing (Stripe Edge Functions in the real build) ---------- */
  const sendBuildInvoice = (c) => {
    setInvoices((inv) => [...inv, { id: Date.now(), clientId: c.id, desc: `Website build — ${c.name}`, amount: c.build || 350, status: "pending", when: d(0) }]);
    ping(`Stripe emailed ${c.name} a hosted invoice for $${c.build || 350} — status pending`);
  };
  const startPlan = (c) => {
    setClients((cs) => cs.map((x) => (x.id === c.id ? { ...x, plan: true } : x)));
    setInvoices((inv) => [...inv, { id: Date.now(), clientId: c.id, desc: "Maintenance plan — monthly", amount: c.monthly || 10, status: "pending", when: d(0) }]);
    ping(`$${c.monthly || 10}/mo subscription started — Stripe auto-bills ${c.name} monthly from now on`);
  };
  const simulateWebhookPaid = (invId) => {
    setInvoices((inv) => inv.map((x) => (x.id === invId ? { ...x, status: "paid" } : x)));
    ping("Stripe webhook received: invoice.paid — status flipped live, no refresh");
  };

  /* ---------- demo prompt builder ---------- */
  const buildPrompt = () => {
    const deal = deals.find((x) => String(x.id) === String(db_dealId));
    if (!deal) { ping("Pick a deal first"); return; }
    const tpl = templates.find((t) => t.id === db_template);
    const slug = deal.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    const p = `You are building a single-file demo homepage for Piedmondo, a lead-generation web agency.

BASE: Start from the structure and quality bar of the "${tpl.name}" template — ${tpl.notes}

CLIENT: ${deal.name}, a ${deal.niche !== "—" ? deal.niche : "[niche]"} business. Contact: ${deal.contact}. Source: ${deal.source}.
SERVICES:
${db_services.trim() ? db_services.trim() : "[list 3–6 services with one-line blurbs]"}

BRAND: primary ${db_primary}, accent ${db_accent}. Vibe: ${db_vibe}. Choose a font pairing that matches the vibe.

REQUIREMENTS:
- Single index.html, no build step, mobile-first, fast load.
- Hero with a clear headline and a call/free-quote CTA above the fold.
- Services grid, service-area line, contact section using the Piedmondo lead form pattern
  (fetch POST to the submit-lead endpoint, include the hidden honeypot field).
- Placeholder testimonials clearly marked FTC-REPLACE-BEFORE-LAUNCH.
- No copyrighted images; CSS textures/gradients only unless client photos are provided.
${db_extras.trim() ? "SPECIAL REQUESTS:\n" + db_extras.trim() + "\n" : ""}
OUTPUT: the complete file at demos/${slug}/index.html, ready to deploy to piedmondo.com/demos/${slug}.`;
    setDbPrompt(p);
  };

  const copyText = (text, key) => {
    try { navigator.clipboard?.writeText(text); } catch (e) {}
    setCopied(key); setTimeout(() => setCopied(null), 1500);
  };

  /* ---------- nav ---------- */
  const nav = [
    { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
    { id: "hunt", label: "Hunt Board", icon: Crosshair, badge: k.untouched + k.queued },
    { id: "pipeline", label: "Pipeline", icon: Kanban, badge: k.openCount },
    { id: "builder", label: "Demo Builder", icon: Wand2 },
    { id: "inbound", label: "Inbound", icon: Inbox, badge: k.inboundNew, hot: k.inboundNew > 0 },
    { id: "clients", label: "Clients & Billing", icon: CreditCard, badge: k.pendingCount },
    { id: "referrals", label: "Referrals", icon: Gift },
    { id: "scripts", label: "Scripts", icon: FileText },
  ];

  return (
    <div className="min-h-screen flex" style={{ background: C.paper, color: C.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap');
        .display { font-family: 'Fraunces', Georgia, serif; }
        button:focus-visible { outline: 2px solid ${C.pine}; outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
      `}</style>

      {/* ---------------- sidebar ---------------- */}
      <aside className="w-56 shrink-0 flex flex-col justify-between py-6 px-4" style={{ background: C.ink }}>
        <div>
          <div className="px-2 mb-8">
            <div className="display text-xl font-semibold tracking-tight leading-tight" style={{ color: C.paper }}>
              PIEDMONDO
            </div>
            <div className="text-[11px] uppercase tracking-widest mt-0.5" style={{ color: C.gold }}>
              Command Center
            </div>
          </div>
          <nav className="space-y-1">
            {nav.map(({ id, label, icon: Icon, badge, hot }) => (
              <button key={id} onClick={() => setView(id)}
                className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm transition-colors"
                style={{
                  background: view === id ? "rgba(255,255,255,0.10)" : "transparent",
                  color: view === id ? C.paper : "rgba(245,242,234,0.62)",
                }}>
                <span className="flex items-center gap-2.5"><Icon size={16} /> {label}</span>
                {badge > 0 && (
                  <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded-full"
                    style={{ background: hot ? C.gold : "rgba(255,255,255,0.14)", color: hot ? C.ink : C.paper }}>
                    {badge}
                  </span>
                )}
              </button>
            ))}
          </nav>
        </div>
        <div className="px-2 space-y-2">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold" style={{ background: C.pine, color: C.paper }}>B</div>
            <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold -ml-3.5" style={{ background: C.gold, color: C.ink }}>A</div>
            <span className="text-xs" style={{ color: "rgba(245,242,234,0.55)" }}>Brady & Alex</span>
          </div>
          <div className="text-[10px]" style={{ color: "rgba(245,242,234,0.35)" }}>
            Demo · Supabase auth + Stripe live build
          </div>
        </div>
      </aside>

      {/* ---------------- main ---------------- */}
      <main className="flex-1 min-w-0 p-8 overflow-auto">

        {/* ============ DASHBOARD ============ */}
        {view === "dashboard" && (
          <div>
            <Header title="Morning, Brady." sub={`${k.overdueFu.length} follow-up${k.overdueFu.length === 1 ? "" : "s"} due · ${k.inboundNew} new inbound · ${k.pendingCount} invoice${k.pendingCount === 1 ? "" : "s"} outstanding`} />

            <div className="grid grid-cols-5 gap-4 mb-6">
              <Kpi icon={DollarSign} label="Open pipeline" value={<Money v={k.pipelineValue} size="text-2xl" />} note={`${k.openCount} active deals`} />
              <Kpi icon={Check} label="Collected (Stripe)" value={<Money v={k.collected} size="text-2xl" color={C.pine} />} note="invoices paid" />
              <Kpi icon={Clock} label="Outstanding" value={<Money v={k.outstanding} size="text-2xl" color="#8A6217" />} note={`${k.pendingCount} pending invoices`} />
              <Kpi icon={Repeat} label="Monthly recurring" value={<Money v={k.mrr} size="text-2xl" />} note={`${clients.filter(c => c.status === "Active").length} active clients`} />
              <Kpi icon={TrendingUp} label="Response rate" value={<span className="display text-2xl font-semibold">{k.responseRate}%</span>} note="of demos sent" />
            </div>

            <div className="grid grid-cols-5 gap-4">
              <section className="col-span-3 rounded-xl bg-white p-5" style={{ border: `1px solid ${C.line}` }}>
                <SectionTitle icon={AlertTriangle} color={C.red}>Follow-ups due</SectionTitle>
                {k.overdueFu.length === 0 ? (
                  <Empty>Nothing due. Go hunt — the board has {k.untouched} untouched prospects.</Empty>
                ) : k.overdueFu.map((x) => (
                  <div key={x.id} className="flex items-center justify-between py-2.5" style={{ borderBottom: `1px solid ${C.line}` }}>
                    <div>
                      <div className="text-sm font-medium">{x.name}</div>
                      <div className="text-xs" style={{ color: C.mute }}>{x.stage} · sent {fmtDate(x.sent)} · via {x.channel}</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <Pill bg={x.followUp < d(0) ? C.redSoft : C.goldSoft} fg={x.followUp < d(0) ? C.red : "#8A6217"}>
                        <Clock size={11} /> {x.followUp < d(0) ? "overdue" : "today"}
                      </Pill>
                      <SmallBtn onClick={() => { advanceDeal(x.id); ping(`${x.name} bumped — follow-up reset to +3 days`); }}>
                        Touched <ArrowRight size={12} />
                      </SmallBtn>
                    </div>
                  </div>
                ))}
              </section>

              <div className="col-span-2 space-y-4">
                <section className="rounded-xl p-5" style={{ background: C.ink, color: C.paper }}>
                  <div className="text-[11px] uppercase tracking-widest mb-3" style={{ color: C.gold }}>This week's hunt</div>
                  {[
                    ["Untouched on the board", k.untouched],
                    ["In the demo queue", k.queued],
                    ["New inbound awaiting reply", k.inboundNew],
                  ].map(([l, v]) => (
                    <div key={l} className="flex items-center justify-between py-1.5 text-sm" style={{ borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                      <span style={{ color: "rgba(245,242,234,0.7)" }}>{l}</span>
                      <span className="display text-lg font-semibold">{v}</span>
                    </div>
                  ))}
                  <div className="text-xs mt-3" style={{ color: "rgba(245,242,234,0.45)" }}>
                    Mon hunt · Tue–Wed build · Thu send · Fri follow up
                  </div>
                </section>

                <section className="rounded-xl bg-white p-5" style={{ border: `1px solid ${C.line}` }}>
                  <SectionTitle icon={CreditCard} color={C.pine}>Recent billing</SectionTitle>
                  {invoices.slice(-4).reverse().map((inv) => (
                    <div key={inv.id} className="flex items-center justify-between py-1.5 text-xs" style={{ borderBottom: `1px solid ${C.line}` }}>
                      <span className="truncate pr-2" style={{ color: C.mute }}>{clients.find(c => c.id === inv.clientId)?.name || "—"}</span>
                      <span className="flex items-center gap-2 shrink-0"><Money v={inv.amount} size="text-xs" />{invoicePill(inv.status)}</span>
                    </div>
                  ))}
                </section>
              </div>
            </div>
          </div>
        )}

        {/* ============ HUNT BOARD ============ */}
        {view === "hunt" && (
          <div>
            <Header title="Hunt Board" sub="Raw prospects — Maps scrapes, LLC filings, group posts. Queue the best, promote to Pipeline when the demo starts."
              action={<SmallBtn solid onClick={() => ping("Live build: paste a whole scrape — rows bulk-insert into Supabase")}><Plus size={13} /> Add prospects</SmallBtn>} />
            <div className="rounded-xl bg-white overflow-hidden" style={{ border: `1px solid ${C.line}` }}>
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-[11px] uppercase tracking-wider" style={{ color: C.mute, background: "#FAF8F2" }}>
                    {["Business", "Niche · City", "Web status", "Source", "Priority", "Stage", ""].map((h) => (
                      <th key={h} className="px-4 py-3 font-medium">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {prospects.map((p) => (
                    <tr key={p.id} style={{ borderTop: `1px solid ${C.line}`, opacity: p.stage === "Moved to Pipeline" ? 0.45 : 1 }}>
                      <td className="px-4 py-3">
                        <div className="font-medium">{p.name}</div>
                        <div className="text-xs flex items-center gap-1" style={{ color: C.mute, fontFamily: "'JetBrains Mono', monospace" }}>
                          {p.phone && <><Phone size={10} /> {p.phone}</>}
                        </div>
                      </td>
                      <td className="px-4 py-3 text-xs" style={{ color: C.mute }}>{p.niche}<br />{p.city}</td>
                      <td className="px-4 py-3">
                        <Pill bg={p.web === "No website" ? C.redSoft : p.web === "Facebook-only" ? C.goldSoft : "#E8ECF2"}
                          fg={p.web === "No website" ? C.red : p.web === "Facebook-only" ? "#8A6217" : "#41546E"}>
                          <Globe size={11} /> {p.web}
                        </Pill>
                      </td>
                      <td className="px-4 py-3 text-xs" style={{ color: C.mute }}>{p.source}</td>
                      <td className="px-4 py-3">{priorityPill(p.priority)}</td>
                      <td className="px-4 py-3 text-xs">{p.stage}</td>
                      <td className="px-4 py-3 text-right whitespace-nowrap">
                        {p.stage === "Untouched" && <SmallBtn onClick={() => queueDemo(p.id)}>Queue demo</SmallBtn>}
                        {p.stage === "Demo queued" && <SmallBtn solid onClick={() => promoteProspect(p.id)}>Build demo <Wand2 size={12} /></SmallBtn>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ============ PIPELINE ============ */}
        {view === "pipeline" && (
          <div>
            <Header title="Pipeline" sub={<span>Open value <Money v={k.pipelineValue} /> across {k.openCount} deals — advance a card as the conversation moves.</span>} />
            <div className="grid grid-cols-5 gap-3 items-start">
              {STAGES.map((stage) => {
                const cards = deals.filter((x) => x.stage === stage);
                return (
                  <div key={stage} className="rounded-xl p-2.5" style={{ background: "#EDEAE0" }}>
                    <div className="flex items-center justify-between px-1.5 pb-2">
                      <span className="text-[11px] font-semibold uppercase tracking-wider" style={{ color: C.mute }}>{stage}</span>
                      <span className="text-[11px]" style={{ fontFamily: "'JetBrains Mono', monospace", color: C.mute }}>
                        ${cards.reduce((s, x) => s + x.quote, 0).toLocaleString()}
                      </span>
                    </div>
                    <div className="space-y-2 min-h-[60px]">
                      {cards.map((x) => (
                        <div key={x.id} className="rounded-lg bg-white p-3 shadow-sm" style={{ border: `1px solid ${C.line}` }}>
                          <div className="text-sm font-medium leading-tight">{x.name}</div>
                          <div className="text-[11px] mt-0.5" style={{ color: C.mute }}>{x.niche} · {x.source}</div>
                          <div className="flex items-center justify-between mt-2">
                            <Money v={x.quote} size="text-xs" />
                            {x.followUp && (
                              <span className="text-[10px] flex items-center gap-1"
                                style={{ color: x.followUp <= d(0) ? C.red : C.mute }}>
                                <Clock size={10} /> {fmtDate(x.followUp)}
                              </span>
                            )}
                          </div>
                          <div className="flex gap-1 mt-2.5">
                            {stage !== "Proposal" ? (
                              <SmallBtn onClick={() => advanceDeal(x.id)} grow>Advance <ArrowRight size={11} /></SmallBtn>
                            ) : (
                              <SmallBtn solid onClick={() => closeDeal(x.id, "Won")} grow><Check size={11} /> Won</SmallBtn>
                            )}
                            <button onClick={() => closeDeal(x.id, stage === "Sent" ? "Ghosted" : "Lost")}
                              className="px-2 rounded-md text-[11px]" style={{ border: `1px solid ${C.line}`, color: C.mute }}
                              title="Mark lost / ghosted"><X size={11} /></button>
                          </div>
                        </div>
                      ))}
                      {cards.length === 0 && <div className="text-[11px] text-center py-4" style={{ color: "#B4AE9E" }}>empty</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="mt-4 text-xs" style={{ color: C.mute }}>
              Closed this cycle: {deals.filter((x) => CLOSED.includes(x.stage)).map((x) => `${x.name} (${x.stage})`).join(" · ") || "none yet"}
            </div>
          </div>
        )}

        {/* ============ DEMO BUILDER ============ */}
        {view === "builder" && (
          <div>
            <Header title="Demo Builder" sub="Fill the brief, copy the prompt, paste into Claude Code — it builds the demo straight into piedmondo.com/demos/[slug]. No API keys, nothing to maintain." />
            <div className="grid grid-cols-2 gap-5 max-w-6xl items-start">
              {/* form */}
              <div className="rounded-xl bg-white p-5 space-y-4" style={{ border: `1px solid ${C.line}` }}>
                <Field label="Deal">
                  <select value={db_dealId} onChange={(e) => setDbDeal(e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm bg-white" style={{ border: `1px solid ${C.line}` }}>
                    <option value="">Select from Pipeline…</option>
                    {deals.filter((x) => !CLOSED.includes(x.stage)).map((x) => (
                      <option key={x.id} value={x.id}>{x.name} — {x.stage}</option>
                    ))}
                  </select>
                </Field>
                <Field label="Base template">
                  <div className="space-y-2">
                    {templates.map((tpl) => (
                      <button key={tpl.id} onClick={() => setDbTemplate(tpl.id)}
                        className="w-full text-left rounded-lg px-3 py-2.5 text-sm transition-colors"
                        style={{ border: `1.5px solid ${db_template === tpl.id ? C.pine : C.line}`, background: db_template === tpl.id ? C.pineSoft : "white" }}>
                        <div className="font-medium text-xs">{tpl.name}</div>
                        <div className="text-[11px] mt-0.5" style={{ color: C.mute }}>{tpl.notes}</div>
                      </button>
                    ))}
                  </div>
                </Field>
                <div className="grid grid-cols-3 gap-3">
                  <Field label="Primary color">
                    <div className="flex items-center gap-2">
                      <input type="color" value={db_primary} onChange={(e) => setDbPrimary(e.target.value)} className="w-8 h-8 rounded cursor-pointer" style={{ border: `1px solid ${C.line}` }} />
                      <span className="text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{db_primary}</span>
                    </div>
                  </Field>
                  <Field label="Accent color">
                    <div className="flex items-center gap-2">
                      <input type="color" value={db_accent} onChange={(e) => setDbAccent(e.target.value)} className="w-8 h-8 rounded cursor-pointer" style={{ border: `1px solid ${C.line}` }} />
                      <span className="text-xs" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{db_accent}</span>
                    </div>
                  </Field>
                  <Field label="Vibe">
                    <select value={db_vibe} onChange={(e) => setDbVibe(e.target.value)} className="w-full rounded-lg px-2 py-2 text-sm bg-white" style={{ border: `1px solid ${C.line}` }}>
                      {["Bold", "Clean", "Warm", "Premium"].map((v) => <option key={v}>{v}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Services (one per line, with a short blurb)">
                  <textarea value={db_services} onChange={(e) => setDbServices(e.target.value)} rows={4}
                    placeholder={"Fades & tapers — walk-ins welcome\nBeard sculpting — hot towel finish\nKids cuts — Saturdays"}
                    className="w-full rounded-lg px-3 py-2 text-sm" style={{ border: `1px solid ${C.line}` }} />
                </Field>
                <Field label="Special requests (optional)">
                  <textarea value={db_extras} onChange={(e) => setDbExtras(e.target.value)} rows={2}
                    placeholder="Booking form, photo gallery, price menu…"
                    className="w-full rounded-lg px-3 py-2 text-sm" style={{ border: `1px solid ${C.line}` }} />
                </Field>
                <SmallBtn solid onClick={buildPrompt}><Wand2 size={13} /> Generate build prompt</SmallBtn>
              </div>

              {/* output */}
              <div className="rounded-xl bg-white p-5" style={{ border: `1px solid ${C.line}` }}>
                <div className="flex items-center justify-between mb-3">
                  <SectionTitle icon={FileText} color={C.pine}>Build prompt</SectionTitle>
                  {db_prompt && (
                    <SmallBtn onClick={() => copyText(db_prompt, "prompt")}>
                      {copied === "prompt" ? <><Check size={12} /> Copied</> : <><Copy size={12} /> Copy for Claude Code</>}
                    </SmallBtn>
                  )}
                </div>
                {db_prompt ? (
                  <pre className="text-xs whitespace-pre-wrap leading-relaxed rounded-lg p-4 max-h-[420px] overflow-auto" style={{ background: "#FAF8F2", color: "#3E4A42" }}>{db_prompt}</pre>
                ) : (
                  <Empty>Pick a deal, set the brief, and generate. The prompt is saved on the deal so you can regenerate or tweak anytime.</Empty>
                )}
                <div className="mt-4 rounded-lg p-3 text-xs leading-relaxed" style={{ background: C.pineSoft, color: "#2A4A3A" }}>
                  <span className="font-semibold">The 5-minute demo pipeline:</span> Copy → paste into Claude Code → it writes demos/[slug]/index.html → push to the repo → Netlify auto-deploys → paste the live URL on the deal card → send with the cold-email script.
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ============ INBOUND ============ */}
        {view === "inbound" && (
          <div>
            <Header title="Inbound" sub="Submissions from the piedmondo.com contact form land here automatically — the second they hit Send." />
            <div className="space-y-3 max-w-3xl">
              {inbound.map((i) => (
                <div key={i.id} className="rounded-xl bg-white p-4 flex items-start justify-between gap-4" style={{ border: `1px solid ${i.status === "New" ? C.gold : C.line}` }}>
                  <div>
                    <div className="flex items-center gap-2">
                      <span className="font-medium text-sm">{i.name}</span>
                      {i.status === "New"
                        ? <Pill bg={C.goldSoft} fg="#8A6217" dot>New</Pill>
                        : <Pill bg={C.pineSoft} fg={C.pine}>In pipeline</Pill>}
                      <span className="text-[11px]" style={{ color: C.mute }}>{fmtDate(i.when)}</span>
                    </div>
                    <div className="text-xs mt-1.5 flex flex-wrap gap-x-4 gap-y-1" style={{ color: C.mute, fontFamily: "'JetBrains Mono', monospace" }}>
                      <span className="flex items-center gap-1"><Mail size={11} /> {i.email}</span>
                      <span className="flex items-center gap-1"><Phone size={11} /> {i.phone}</span>
                      <span className="flex items-center gap-1"><Globe size={11} /> {i.biz}</span>
                    </div>
                    <div className="text-sm mt-2 italic" style={{ color: "#3E4A42" }}>"{i.need}"</div>
                  </div>
                  {i.status === "New" && (
                    <SmallBtn solid onClick={() => inboundToPipeline(i.id)}>To Pipeline <ArrowRight size={12} /></SmallBtn>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ============ CLIENTS & BILLING ============ */}
        {view === "clients" && (
          <div>
            <Header title="Clients & Billing" sub={<span>Collected <Money v={k.collected} color={C.pine} /> · Outstanding <Money v={k.outstanding} color="#8A6217" /> · <Money v={k.mrr} />/mo recurring. Cards live in Stripe — we store only statuses.</span>} />
            <div className="grid grid-cols-2 gap-4 max-w-5xl">
              {clients.map((c) => {
                const cInv = invoices.filter((i) => i.clientId === c.id);
                return (
                  <div key={c.id} className="rounded-xl bg-white p-4" style={{ border: `1px solid ${C.line}` }}>
                    <div className="flex items-start justify-between">
                      <div>
                        <div className="display text-lg font-semibold leading-tight">{c.name}</div>
                        <div className="text-xs mt-0.5" style={{ color: C.mute }}>{c.niche} · {c.city}</div>
                      </div>
                      <Pill bg={C.pineSoft} fg={C.pine} dot>{c.status}</Pill>
                    </div>

                    {/* billing strip */}
                    <div className="flex gap-2 mt-3">
                      <SmallBtn onClick={() => sendBuildInvoice(c)}><Send size={12} /> Send invoice</SmallBtn>
                      {c.plan ? (
                        <Pill bg={C.pineSoft} fg={C.pine}><Repeat size={11} /> $10/mo plan active</Pill>
                      ) : (
                        <SmallBtn solid onClick={() => startPlan(c)}><Repeat size={12} /> Start $10/mo plan</SmallBtn>
                      )}
                    </div>

                    {/* invoice history */}
                    <div className="mt-3 pt-3 space-y-1.5" style={{ borderTop: `1px solid ${C.line}` }}>
                      {cInv.length === 0 && <div className="text-xs" style={{ color: "#9AA59E" }}>No invoices yet.</div>}
                      {cInv.map((inv) => (
                        <div key={inv.id} className="flex items-center justify-between text-xs">
                          <span className="truncate pr-2" style={{ color: C.mute }}>{fmtDate(inv.when)} · {inv.desc}</span>
                          <span className="flex items-center gap-2 shrink-0">
                            <Money v={inv.amount} size="text-xs" />
                            {inv.status !== "paid" ? (
                              <button onClick={() => simulateWebhookPaid(inv.id)} title="Demo: simulate the Stripe webhook firing when the customer pays">
                                {invoicePill(inv.status)}
                              </button>
                            ) : invoicePill(inv.status)}
                          </span>
                        </div>
                      ))}
                    </div>
                    {cInv.some((i) => i.status !== "paid") && (
                      <div className="text-[10px] mt-2" style={{ color: "#B4AE9E" }}>demo: tap a Pending pill to simulate the customer paying (Stripe webhook)</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ============ REFERRALS ============ */}
        {view === "referrals" && (
          <div>
            <Header title="Referrals" sub="$50 per closed referral. Trades talk — this tab should get busy." />
            <div className="rounded-xl bg-white overflow-hidden max-w-3xl" style={{ border: `1px solid ${C.line}` }}>
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-[11px] uppercase tracking-wider" style={{ color: C.mute, background: "#FAF8F2" }}>
                    {["Referrer", "Referred business", "Status", "Payout", "Paid"].map((h) => <th key={h} className="px-4 py-3 font-medium">{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {referrals.map((r) => (
                    <tr key={r.id} style={{ borderTop: `1px solid ${C.line}` }}>
                      <td className="px-4 py-3 font-medium">{r.referrer}</td>
                      <td className="px-4 py-3">{r.business}</td>
                      <td className="px-4 py-3"><Pill bg={C.goldSoft} fg="#8A6217">{r.status}</Pill></td>
                      <td className="px-4 py-3"><Money v={r.payout} /></td>
                      <td className="px-4 py-3 text-xs" style={{ color: C.mute }}>{r.paid ? "Yes" : "When it closes"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ============ SCRIPTS ============ */}
        {view === "scripts" && (
          <div>
            <Header title="Scripts" sub="Personalize the [brackets]. Short beats clever — the demo link does the selling." />
            <div className="grid grid-cols-2 gap-4 max-w-5xl">
              {scripts.map((s, i) => (
                <div key={s.title} className="rounded-xl bg-white p-4 flex flex-col" style={{ border: `1px solid ${C.line}` }}>
                  <div className="flex items-center justify-between mb-2">
                    <div>
                      <span className="font-medium text-sm">{s.title}</span>
                      <span className="ml-2 text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style={{ background: C.pineSoft, color: C.pine }}>{s.tag}</span>
                    </div>
                    <SmallBtn onClick={() => copyText(s.body, i)}>{copied === i ? <><Check size={12} /> Copied</> : <><Copy size={12} /> Copy</>}</SmallBtn>
                  </div>
                  <pre className="text-xs whitespace-pre-wrap leading-relaxed flex-1 rounded-lg p-3" style={{ background: "#FAF8F2", color: "#3E4A42", fontFamily: "inherit" }}>{s.body}</pre>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* toast */}
      {toast && (
        <div className="fixed bottom-6 right-6 max-w-sm px-4 py-3 rounded-lg text-sm shadow-lg flex items-center gap-2"
          style={{ background: C.ink, color: C.paper }}>
          <Check size={14} style={{ color: C.gold }} /> {toast}
        </div>
      )}
    </div>
  );
}

/* ---------------- shared bits ---------------- */

function Header({ title, sub, action }) {
  return (
    <div className="flex items-end justify-between mb-6">
      <div>
        <h1 className="display text-3xl font-semibold tracking-tight">{title}</h1>
        <p className="text-sm mt-1" style={{ color: "#6E7A72" }}>{sub}</p>
      </div>
      {action}
    </div>
  );
}

function Kpi({ icon: Icon, label, value, note }) {
  return (
    <div className="rounded-xl bg-white p-4" style={{ border: "1px solid #E3DECF" }}>
      <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wider mb-2" style={{ color: "#6E7A72" }}>
        <Icon size={12} /> {label}
      </div>
      <div>{value}</div>
      <div className="text-xs mt-1" style={{ color: "#9AA59E" }}>{note}</div>
    </div>
  );
}

function SectionTitle({ icon: Icon, color, children }) {
  return (
    <div className="flex items-center gap-2 mb-3">
      <Icon size={14} style={{ color }} />
      <span className="text-sm font-semibold">{children}</span>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="text-[11px] uppercase tracking-wider mb-1.5" style={{ color: "#6E7A72" }}>{label}</div>
      {children}
    </div>
  );
}

function SmallBtn({ children, onClick, solid, grow }) {
  return (
    <button onClick={onClick}
      className={`inline-flex items-center justify-center gap-1 px-2.5 py-1.5 rounded-md text-[11px] font-medium transition-colors ${grow ? "flex-1" : ""}`}
      style={solid
        ? { background: "#2F6B4F", color: "#F5F2EA" }
        : { border: "1px solid #E3DECF", color: "#1E2B23", background: "white" }}>
      {children}
    </button>
  );
}

function Empty({ children }) {
  return <div className="text-sm py-6 text-center" style={{ color: "#9AA59E" }}>{children}</div>;
}


import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<PiedmondoCommandCenter />);

</script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</body>
</html>
